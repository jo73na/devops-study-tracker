<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Study Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f4;
    --bg-tertiary: #f0efed;
    --border: rgba(0,0,0,0.1);
    --border-md: rgba(0,0,0,0.18);
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --hint: #999;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1e;
      --bg-secondary: #2c2c2e;
      --bg-tertiary: #3a3a3c;
      --border: rgba(255,255,255,0.1);
      --border-md: rgba(255,255,255,0.18);
      --text: #f2f2f7;
      --muted: #aeaeb2;
      --hint: #6e6e73;
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg-tertiary);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  .app-shell {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  .header { margin-bottom: 1.75rem; }
  .header h1 {
    font-size: 26px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .header h1 i { font-size: 24px; color: #0d6fa3; }
  .header p { font-size: 14px; color: var(--muted); }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  @media (max-width: 600px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr !important; }
  }

  .metric {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 14px 16px;
  }
  .metric-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .metric-value { font-size: 24px; font-weight: 600; }
  .metric-sub { font-size: 11px; color: var(--hint); margin-top: 3px; }

  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .chart-card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
  }
  .chart-card h3 {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 12px;
  }

  .roadmap { display: flex; flex-direction: column; gap: 10px; }

  .module-card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }
  .module-card:hover { border-color: var(--border-md); box-shadow: 0 2px 12px rgba(0,0,0,.06); }

  .module-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .module-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .module-meta { flex: 1; min-width: 0; }
  .module-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }

  .module-progress-bar {
    height: 4px;
    border-radius: 2px;
    background: var(--bg-secondary);
    overflow: hidden;
  }
  .module-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width .5s ease;
  }

  .module-stats { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .module-pct { font-size: 13px; font-weight: 600; min-width: 36px; text-align: right; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    font-weight: 500;
  }

  .chevron { font-size: 15px; color: var(--hint); transition: transform .25s; }

  .module-body { display: none; border-top: 0.5px solid var(--border); }
  .module-body.open { display: block; }

  .topics-list {
    padding: 10px 18px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .topic-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 6px;
    border-radius: 7px;
    cursor: pointer;
    transition: background .15s;
  }
  .topic-row:hover { background: var(--bg-secondary); }

  .topic-check {
    width: 19px;
    height: 19px;
    border-radius: 5px;
    border: 1.5px solid var(--border-md);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all .2s;
  }
  .topic-check.done { border-color: transparent; }
  .topic-check.done i { color: #fff; }

  .topic-label { font-size: 14px; flex: 1; transition: color .2s; }
  .topic-label.done { color: var(--hint); text-decoration: line-through; }

  .module-footer { padding: 12px 18px 18px; display: flex; flex-direction: column; gap: 14px; }

  .study-log-section label,
  .notes-section label {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .log-btn {
    font-size: 12px;
    padding: 3px 10px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: none;
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md);
    color: var(--text);
    cursor: pointer;
    transition: background .15s;
  }
  .log-btn:hover { background: var(--bg-secondary); }

  .study-log { display: flex; flex-direction: column; gap: 0; }
  .log-entry {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    font-size: 13px;
    color: var(--muted);
    border-bottom: 0.5px solid var(--border);
  }
  .log-entry:last-child { border-bottom: none; }
  .log-date { color: var(--hint); font-size: 11px; min-width: 72px; }
  .log-hours { font-weight: 600; color: var(--text); }
  .no-logs { font-size: 13px; color: var(--hint); padding: 4px 0; }

  textarea {
    width: 100%;
    min-height: 72px;
    font-size: 13px;
    font-family: var(--font);
    resize: vertical;
    background: var(--bg-secondary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
    line-height: 1.6;
  }
  textarea:focus { border-color: var(--border-md); }
  textarea::placeholder { color: var(--hint); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 999;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }

  .modal-box {
    background: var(--bg-primary);
    border-radius: var(--radius-xl);
    border: 0.5px solid var(--border-md);
    padding: 22px;
    width: 360px;
    max-width: 100%;
    box-shadow: 0 16px 48px rgba(0,0,0,.18);
    animation: slideUp .2s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(12px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .modal-title { font-size: 16px; font-weight: 600; }
  .modal-close {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 22px;
    line-height: 1;
    padding: 2px;
    border-radius: 6px;
    transition: background .15s;
  }
  .modal-close:hover { background: var(--bg-secondary); }

  .modal-label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 8px; }

  .modal-input {
    width: 100%;
    padding: 10px 12px;
    font-size: 15px;
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md);
    background: var(--bg-secondary);
    color: var(--text);
    outline: none;
    margin-bottom: 16px;
    transition: border-color .2s;
  }
  .modal-input:focus { border-color: #0d6fa3; }

  .modal-submit {
    width: 100%;
    padding: 10px;
    font-size: 14px;
    font-weight: 600;
    background: #0d6fa3;
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: background .15s, transform .1s;
  }
  .modal-submit:hover { background: #0b5f8c; }
  .modal-submit:active { transform: scale(.98); }

  .section-divider {
    height: 0.5px;
    background: var(--border);
    margin: 2px 0;
  }
</style>
</head>
<body>

<div class="app-shell">
  <div class="header">
    <h1><i class="ti ti-brand-docker"></i> DevOps Study Tracker</h1>
    <p>Track your progress across the full DevOps roadmap — topics, study hours, and notes.</p>
  </div>

  <div class="summary-grid" id="summaryGrid"></div>

  <div class="charts-row">
    <div class="chart-card">
      <h3>Progress by module</h3>
      <div style="position:relative;height:200px;">
        <canvas id="progressChart" role="img" aria-label="Bar chart showing completion percentage per module">Module completion percentages.</canvas>
      </div>
    </div>
    <div class="chart-card">
      <h3>Study hours logged</h3>
      <div style="position:relative;height:200px;">
        <canvas id="hoursChart" role="img" aria-label="Bar chart showing total study hours per module">Study hours per module.</canvas>
      </div>
    </div>
  </div>

  <div class="roadmap" id="roadmap"></div>
</div>

<!-- Log Hours Modal -->
<div class="modal-overlay" id="logModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Log study hours</span>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>
    </div>
    <label class="modal-label" for="modalHours">Hours studied in this session</label>
    <input class="modal-input" type="number" id="modalHours" min="0.5" max="24" step="0.5" value="1">
    <button class="modal-submit" onclick="submitHours()">
      <i class="ti ti-check" style="font-size:14px;vertical-align:-1px;margin-right:5px;"></i>Log hours
    </button>
  </div>
</div>

<script>
const MODULES = [
  {
    id:'linux', name:'Linux Fundamentals', icon:'ti-terminal', color:'#5f6fad', bg:'rgba(95,111,173,.12)',
    topics:['File system & navigation','Users, groups & permissions','Processes & signals','Package management (apt/yum)','Shell scripting basics','Cron jobs & scheduling','Networking tools (curl, netstat, ss)','SSH & key-based auth','Log management & journald','Systemd & services']
  },
  {
    id:'git', name:'Git & Version Control', icon:'ti-git-branch', color:'#d4622a', bg:'rgba(212,98,42,.12)',
    topics:['Git init, clone, add, commit','Branching & merging strategies','Rebasing & cherry-pick','Remote repos & pull requests','Git hooks','Tagging & semantic versioning','Resolving merge conflicts','Monorepos & submodules','Git workflows (GitFlow, trunk)','GitHub Actions basics']
  },
  {
    id:'cicd', name:'CI/CD Pipelines', icon:'ti-refresh', color:'#2a8aad', bg:'rgba(42,138,173,.12)',
    topics:['CI vs CD vs CD concepts','GitHub Actions workflows','Jenkins fundamentals','Pipeline as code','Automated testing in pipelines','Artifact management','Environment promotion strategies','Blue-green & canary deploys','Pipeline security scanning','Monitoring deployments']
  },
  {
    id:'docker', name:'Docker & Containers', icon:'ti-brand-docker', color:'#0d6fa3', bg:'rgba(13,111,163,.12)',
    topics:['Container vs VM concepts','Dockerfile best practices','Image layers & caching','Docker Compose','Volumes & bind mounts','Networking in Docker','Multi-stage builds','Container registries','Docker security hardening','Debugging containers']
  },
  {
    id:'k8s', name:'Kubernetes', icon:'ti-steering-wheel', color:'#3a6bb5', bg:'rgba(58,107,181,.12)',
    topics:['Pods, ReplicaSets, Deployments','Services & Ingress','ConfigMaps & Secrets','Persistent Volumes','Namespaces & RBAC','Helm charts','Horizontal Pod Autoscaling','DaemonSets & StatefulSets','Monitoring with Prometheus','K8s networking (CNI)']
  }
];

let state = JSON.parse(localStorage.getItem('devops_tracker_v2') || 'null') || {
  checked: {}, notes: {}, hours: {}
};
let activeModal = null;
let progressChart = null, hoursChart = null;

function save() { localStorage.setItem('devops_tracker_v2', JSON.stringify(state)); }

function getModuleProgress(m) {
  const done = m.topics.filter((_,i) => state.checked[m.id+'_'+i]).length;
  return Math.round((done / m.topics.length) * 100);
}

function getTotalHours(mid) {
  return (state.hours[mid] || []).reduce((a,b) => a + b.h, 0);
}

function renderSummary() {
  const total = MODULES.reduce((a,m)=>a+m.topics.length,0);
  const checked = MODULES.reduce((a,m)=>a+m.topics.filter((_,i)=>state.checked[m.id+'_'+i]).length,0);
  const pct = Math.round(checked/total*100);
  const totalH = MODULES.reduce((a,m)=>a+getTotalHours(m.id),0);
  const completed = MODULES.filter(m=>getModuleProgress(m)===100).length;
  document.getElementById('summaryGrid').innerHTML = `
    <div class="metric"><div class="metric-label"><i class="ti ti-chart-pie-2" style="font-size:14px;"></i> Overall</div><div class="metric-value">${pct}%</div><div class="metric-sub">${checked} of ${total} topics</div></div>
    <div class="metric"><div class="metric-label"><i class="ti ti-clock" style="font-size:14px;"></i> Total hours</div><div class="metric-value">${totalH.toFixed(1)}</div><div class="metric-sub">hours studied</div></div>
    <div class="metric"><div class="metric-label"><i class="ti ti-trophy" style="font-size:14px;"></i> Modules done</div><div class="metric-value">${completed}</div><div class="metric-sub">of ${MODULES.length} modules</div></div>
    <div class="metric"><div class="metric-label"><i class="ti ti-flame" style="font-size:14px;"></i> Avg hrs</div><div class="metric-value">${(totalH/MODULES.length).toFixed(1)}</div><div class="metric-sub">per module</div></div>
  `;
}

function renderCharts() {
  const labels = MODULES.map(m => m.name.split(' ')[0]);
  const progData = MODULES.map(m => getModuleProgress(m));
  const hoursData = MODULES.map(m => getTotalHours(m.id));
  const colors = MODULES.map(m => m.color);
  const bgColors = MODULES.map(m => m.color + '33');

  if (progressChart) progressChart.destroy();
  progressChart = new Chart(document.getElementById('progressChart'), {
    type: 'bar',
    data: { labels, datasets: [{ label: '% complete', data: progData, backgroundColor: bgColors, borderColor: colors, borderWidth: 1.5, borderRadius: 5 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { y: { min: 0, max: 100, ticks: { callback: v => v+'%', font: { size: 11 } }, grid: { color: 'rgba(128,128,128,.08)' } }, x: { ticks: { font: { size: 11 } }, grid: { display: false } } } }
  });

  if (hoursChart) hoursChart.destroy();
  hoursChart = new Chart(document.getElementById('hoursChart'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Hours', data: hoursData, backgroundColor: bgColors, borderColor: colors, borderWidth: 1.5, borderRadius: 5 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { y: { ticks: { font: { size: 11 } }, grid: { color: 'rgba(128,128,128,.08)' } }, x: { ticks: { font: { size: 11 } }, grid: { display: false } } } }
  });
}

function renderRoadmap() {
  const container = document.getElementById('roadmap');
  container.innerHTML = '';
  MODULES.forEach(m => {
    const pct = getModuleProgress(m);
    const totalH = getTotalHours(m.id);
    const logs = state.hours[m.id] || [];
    const note = state.notes[m.id] || '';
    const isOpen = state['open_'+m.id];

    const card = document.createElement('div');
    card.className = 'module-card';
    card.innerHTML = `
      <div class="module-header" onclick="toggleModule('${m.id}')">
        <div class="module-icon" style="background:${m.bg};color:${m.color};"><i class="ti ${m.icon}"></i></div>
        <div class="module-meta">
          <div class="module-name">${m.name}</div>
          <div class="module-progress-bar"><div class="module-progress-fill" style="width:${pct}%;background:${m.color};"></div></div>
        </div>
        <div class="module-stats">
          <span class="badge" style="background:${m.bg};color:${m.color};"><i class="ti ti-clock" style="font-size:11px;"></i>${totalH.toFixed(1)}h</span>
          <span class="module-pct" style="color:${pct===100?m.color:'var(--muted)'};">${pct}%</span>
        </div>
        <i class="ti ti-chevron-down chevron" style="transform:rotate(${isOpen?180:0}deg);"></i>
      </div>
      <div class="module-body${isOpen?' open':''}">
        <div class="topics-list">
          ${m.topics.map((t,i) => {
            const checked = state.checked[m.id+'_'+i];
            return `<div class="topic-row" onclick="toggleTopic('${m.id}',${i})">
              <div class="topic-check${checked?' done':''}" style="${checked?`background:${m.color};border-color:${m.color};`:''}">
                ${checked?`<i class="ti ti-check" style="font-size:11px;color:#fff;"></i>`:''}
              </div>
              <span class="topic-label${checked?' done':''}">${t}</span>
            </div>`;
          }).join('')}
        </div>
        <div class="section-divider"></div>
        <div class="module-footer">
          <div class="study-log-section">
            <label>
              <span><i class="ti ti-clock" style="font-size:13px;vertical-align:-1px;margin-right:4px;"></i>Study log</span>
              <button class="log-btn" onclick="openModal('${m.id}');event.stopPropagation();"><i class="ti ti-plus" style="font-size:12px;"></i> Log hours</button>
            </label>
            <div class="study-log">
              ${logs.length === 0
                ? `<div class="no-logs">No hours logged yet — hit "Log hours" after each session.</div>`
                : logs.slice(-5).reverse().map(l => `
                  <div class="log-entry">
                    <span class="log-date"><i class="ti ti-calendar" style="font-size:11px;vertical-align:-1px;margin-right:3px;"></i>${l.date}</span>
                    <i class="ti ti-clock" style="font-size:12px;"></i>
                    <span class="log-hours">${l.h}h</span>
                  </div>`).join('')
              }
            </div>
          </div>
          <div class="notes-section">
            <label><i class="ti ti-notes" style="font-size:13px;vertical-align:-1px;margin-right:4px;"></i>Notes</label>
            <textarea placeholder="Add notes, links, or reminders for this module…" oninput="saveNote('${m.id}',this.value)">${note}</textarea>
          </div>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}

function toggleModule(id) {
  state['open_'+id] = !state['open_'+id];
  save();
  renderRoadmap();
}

function toggleTopic(mid, idx) {
  const key = mid+'_'+idx;
  state.checked[key] = !state.checked[key];
  save();
  renderAll();
}

function saveNote(mid, val) {
  state.notes[mid] = val;
  save();
}

function openModal(mid) {
  activeModal = mid;
  const m = MODULES.find(x => x.id === mid);
  document.getElementById('modalTitle').textContent = 'Log hours — ' + m.name;
  document.getElementById('modalHours').value = '1';
  document.getElementById('logModal').classList.add('open');
}

function closeModal() {
  document.getElementById('logModal').classList.remove('open');
  activeModal = null;
}

function submitHours() {
  if (!activeModal) return;
  const h = parseFloat(document.getElementById('modalHours').value);
  if (!h || h <= 0) return;
  if (!state.hours[activeModal]) state.hours[activeModal] = [];
  const date = new Date().toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
  state.hours[activeModal].push({ date, h });
  save();
  closeModal();
  renderAll();
}

function renderAll() {
  renderSummary();
  renderCharts();
  renderRoadmap();
}

document.getElementById('logModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

renderAll();
</script>
</body>
</html>
